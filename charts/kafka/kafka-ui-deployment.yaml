apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: kafka
  labels:
    app: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
      - name: kafka-ui
        image: provectuslabs/kafka-ui:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: "local"
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: "kafka.kafka.svc.cluster.local:9092"
        - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME
          value: "local-connect"
        - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS
          value: "http://connect.kafka.svc.cluster.local:8083"
        - name: KAFKA_CLUSTERS_0_SCHEMAREGISTRY
          value: "http://schema-registry.kafka.svc.cluster.local:8081"
        - name: KAFKA_CLUSTERS_0_KAFKAREST
          value: "http://kafka-rest.kafka.svc.cluster.local:80"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: kafka
  labels:
    app: kafka-ui
spec:
  ports:
  - port: 80
    name: http
    targetPort: 8080
  selector:
    app: kafka-ui
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui-external
  namespace: kafka
  labels:
    app: kafka-ui
spec:
  type: LoadBalancer
  ports:
  - port: 80
    name: http
    targetPort: 8080
  selector:
    app: kafka-ui
